worker_processes auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ─── Logging ─────────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    '$request_time';
    access_log /var/log/nginx/access.log main;

    # ─── Performance ─────────────────────────────────────────────────────────
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml text/javascript;
    gzip_min_length 1000;

    # ─── Security headers ─────────────────────────────────────────────────────
    add_header X-Frame-Options           "DENY"              always;
    add_header X-Content-Type-Options    "nosniff"           always;
    add_header X-XSS-Protection          "1; mode=block"     always;
    add_header Referrer-Policy           "same-origin"        always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ─── Rate limiting zones (per IP) ────────────────────────────────────────
    limit_req_zone  $binary_remote_addr zone=api:10m    rate=30r/s;
    limit_req_zone  $binary_remote_addr zone=login:10m  rate=5r/m;
    limit_conn_zone $binary_remote_addr zone=connlimit:10m;

    # ─── Upstream Django ─────────────────────────────────────────────────────
    upstream django {
        # If running multiple backend containers, add their addresses here
        server backend:8000;
        keepalive 32;
    }

    server {
        listen 80;
        server_name _;  # Replace with your domain in production

        client_max_body_size 60M;   # Allow document uploads (> Django MAX_UPLOAD_SIZE)
        limit_conn connlimit 20;    # Max 20 simultaneous connections per IP

        # ─── Frontend (React SPA) ───────────────────────────────────────────
        root /usr/share/nginx/html;
        index index.html;

        location / {
            try_files $uri $uri/ /index.html;
            # Aggressive caching for hashed assets, no-cache for index.html
            add_header Cache-Control "no-cache, no-store, must-revalidate";
        }

        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # ─── Django static files ────────────────────────────────────────────
        location /static/ {
            alias /app/staticfiles/;
            expires 30d;
            add_header Cache-Control "public";
        }

        # ─── Media uploads ──────────────────────────────────────────────────
        location /media/ {
            alias /app/media/;
            expires 7d;
        }

        # ─── Django API ─────────────────────────────────────────────────────
        location /api/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass         http://django;
            proxy_http_version 1.1;
            proxy_set_header   Connection        "";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;  # Allow for long RAG queries
        }

        # ─── Auth endpoints — stricter rate limiting ─────────────────────────
        location /api/auth/login/ {
            limit_req zone=login burst=3 nodelay;
            proxy_pass         http://django;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # ─── Django admin ───────────────────────────────────────────────────
        location /admin/ {
            allow 127.0.0.1;  # Restrict admin to localhost/VPN in prod
            allow 10.0.0.0/8;
            deny all;
            proxy_pass       http://django;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # ─── Health check (bypass rate limiting) ────────────────────────────
        location /api/health/ {
            proxy_pass       http://django;
            access_log       off;
        }

        location /healthz {
            proxy_pass       http://django;
            access_log       off;
        }

        location /readyz {
            proxy_pass       http://django;
            access_log       off;
        }
    }
}
