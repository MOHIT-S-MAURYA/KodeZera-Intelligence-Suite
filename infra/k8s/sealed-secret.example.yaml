# Example template only. Replace with your cluster's SealedSecret output.
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: kodezera-secrets
  namespace: kodezera
spec:
  encryptedData:
    SECRET_KEY: <sealed-secret-value>
    JWT_SECRET_KEY: <sealed-secret-value>
    DATABASE_URL: <sealed-secret-value>
    POSTGRES_PASSWORD: <sealed-secret-value>
    REDIS_PASSWORD: <sealed-secret-value>
    OPENAI_API_KEY: <sealed-secret-value>
  template:
    metadata:
      name: kodezera-secrets
      namespace: kodezera
    type: Opaque
