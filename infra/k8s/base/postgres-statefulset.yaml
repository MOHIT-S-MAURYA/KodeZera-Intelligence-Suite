apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: kodezera-postgres
  namespace: kodezera
  labels:
    app: kodezera
    component: postgres
spec:
  serviceName: kodezera-postgres
  replicas: 1
  selector:
    matchLabels:
      app: kodezera
      component: postgres
  template:
    metadata:
      labels:
        app: kodezera
        component: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:15-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: kodezera_db
            - name: POSTGRES_USER
              value: kodezera
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: kodezera-secrets
                  key: POSTGRES_PASSWORD
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "1024Mi"
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 20Gi
