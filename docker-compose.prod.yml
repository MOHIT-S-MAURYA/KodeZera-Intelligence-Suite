version: '3.8'

# ─── Production docker-compose ────────────────────────────────────────────────
# Usage:
#   docker-compose -f docker-compose.prod.yml up -d
#
# Before first run:
#   1. Copy .env.example to .env and fill in all values
#   2. Set DEBUG=False, proper SECRET_KEY, ALLOWED_HOSTS, CORS_ALLOWED_ORIGINS
#   3. docker-compose -f docker-compose.prod.yml run --rm backend python manage.py createsuperuser

x-backend-common: &backend-common
  image: kodezera:latest # built with: docker build -t kodezera:latest .
  env_file: .env
  volumes:
    - media_data:/app/media
    - static_data:/app/staticfiles
    - logs_data:/app/logs
  depends_on:
    db:
      condition: service_healthy
    redis:
      condition: service_healthy
    qdrant:
      condition: service_healthy
  restart: unless-stopped

services:
  # ─── PostgreSQL ─────────────────────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    env_file: .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-kodezera_db}
      POSTGRES_USER: ${POSTGRES_USER:-kodezera}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-kodezera}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ─── PgBouncer (connection pooler) ──────────────────────────────────────────
  pgbouncer:
    image: edoburu/pgbouncer:latest
    environment:
      DATABASE_URL: "postgres://${POSTGRES_USER:-kodezera}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-kodezera_db}"
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 200
      DEFAULT_POOL_SIZE: 20
      SERVER_RESET_QUERY: DISCARD ALL
    ports:
      - "6432:5432"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  # ─── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    command: >
      redis-server --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD is required} --maxmemory 256mb --maxmemory-policy allkeys-lru --save 60 1000
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ─── Qdrant Vector DB ────────────────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:v1.7.4
    volumes:
      - qdrant_data:/qdrant/storage
    ports:
      - "6333:6333"
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:6333/health" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ─── Django API (Gunicorn) ───────────────────────────────────────────────────
  backend:
    <<: *backend-common
    command: gunicorn config.wsgi:application --config gunicorn.conf.py
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-kodezera}:${POSTGRES_PASSWORD}@pgbouncer:5432/${POSTGRES_DB:-kodezera_db}
    ports:
      - "8000:8000"

  # ─── Celery Default Worker (chat queries, API tasks) ─────────────────────────
  celery_default:
    <<: *backend-common
    command: celery -A config worker --queues=default --concurrency=4 --loglevel=info --hostname=worker-default@%h
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-kodezera}:${POSTGRES_PASSWORD}@pgbouncer:5432/${POSTGRES_DB:-kodezera_db}

  # ─── Celery Embedding Worker (CPU-heavy document processing) ─────────────────
  celery_embedding:
    <<: *backend-common
    command: celery -A config worker --queues=embedding --concurrency=2 --loglevel=info --hostname=worker-embedding@%h
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-kodezera}:${POSTGRES_PASSWORD}@pgbouncer:5432/${POSTGRES_DB:-kodezera_db}

  # ─── Nginx (reverse proxy + static files) ───────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - static_data:/app/staticfiles:ro
      - media_data:/app/media:ro
      - ./frontend/dist:/usr/share/nginx/html:ro
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
  media_data:
  static_data:
  logs_data:
